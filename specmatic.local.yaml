version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/orderApiService"
    runOptions:
      $ref: "#/components/runOptions/orderApiServiceTest"
components:
  sources:
    localSpecs:
      filesystem:
        directory: ./specmatic
  services:
    orderApiService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localSpecs"
            specs:
              - spec:
                  id: order-api-v1
                  path: openapi.v1.yaml
  runOptions:
    orderApiServiceTest:
      openapi:
        type: test
        baseUrl: "{APP_URL:http://localhost:8080}"
